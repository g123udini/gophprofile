replicaCount: 2

image:
  repository: avatar-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  httpPort: 80
  metricsPort: 9090

ingress:
  enabled: true
  host: gophprofile.local
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuUtilization: 70
  memoryUtilization: 80

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: false
  interval: 30s

config:
  logLevel: info
  appPort: "8080"
  metricsPort: "9090"
  dbHost: postgres
  dbPort: "5432"
  dbName: gophprofile
  minioEndpoint: minio:9000
  rabbitmqHost: rabbitmq
  rabbitmqPort: "5672"

secrets:
  dbUser: gophprofile
  dbPassword: changeme
  minioAccessKey: minioadmin
  minioSecretKey: minioadmin
  rabbitmqUser: guest
  rabbitmqPassword: guest
