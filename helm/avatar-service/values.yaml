replicaCount: 2

image:
  repository: avatar-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  httpPort: 80
  metricsPort: 9090

ingress:
  enabled: true
  host: gophprofile.local
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuUtilization: 70
  memoryUtilization: 80

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: false
  interval: 30s

config:
  logLevel: info
  httpPort: "8080"
  metricsPort: "9090"
  s3Endpoint: minio:9000
  s3Bucket: avatars
  rabbitExchange: avatars.exchange

secrets:
  postgresDSN: "postgres://gophprofile:PLACEHOLDER@postgres:5432/gophprofile?sslmode=disable"
  s3AccessKey: PLACEHOLDER
  s3SecretKey: PLACEHOLDER
  rabbitURL: "amqp://PLACEHOLDER:PLACEHOLDER@rabbitmq:5672/"
