apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "avatar-service.fullname" . }}
  labels:
    {{- include "avatar-service.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "avatar-service.fullname" . }}
  labels:
    {{- include "avatar-service.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "avatar-service.fullname" . }}
  labels:
    {{- include "avatar-service.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "avatar-service.fullname" . }}
roleRef:
  kind: Role
  name: {{ include "avatar-service.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
