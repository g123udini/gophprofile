apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "avatar-service.fullname" . }}-config
  labels:
    {{- include "avatar-service.labels" . | nindent 4 }}
data:
  APP_PORT: {{ .Values.config.appPort | quote }}
  METRICS_PORT: {{ .Values.config.metricsPort | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  DB_HOST: {{ .Values.config.dbHost | quote }}
  DB_PORT: {{ .Values.config.dbPort | quote }}
  DB_NAME: {{ .Values.config.dbName | quote }}
  MINIO_ENDPOINT: {{ .Values.config.minioEndpoint | quote }}
  RABBITMQ_HOST: {{ .Values.config.rabbitmqHost | quote }}
  RABBITMQ_PORT: {{ .Values.config.rabbitmqPort | quote }}
