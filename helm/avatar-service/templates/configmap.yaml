apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "avatar-service.fullname" . }}-config
  labels:
    {{- include "avatar-service.labels" . | nindent 4 }}
data:
  HTTP_PORT: {{ .Values.config.httpPort | quote }}
  METRICS_PORT: {{ .Values.config.metricsPort | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  S3_ENDPOINT: {{ .Values.config.s3Endpoint | quote }}
  S3_BUCKET: {{ .Values.config.s3Bucket | quote }}
  RABBIT_EXCHANGE: {{ .Values.config.rabbitExchange | quote }}
