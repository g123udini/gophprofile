apiVersion: v1
kind: Secret
metadata:
  name: {{ include "avatar-service.fullname" . }}-secrets
  labels:
    {{- include "avatar-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DSN: {{ .Values.secrets.postgresDSN | quote }}
  S3_ACCESS_KEY: {{ .Values.secrets.s3AccessKey | quote }}
  S3_SECRET_KEY: {{ .Values.secrets.s3SecretKey | quote }}
  RABBIT_URL: {{ .Values.secrets.rabbitURL | quote }}
