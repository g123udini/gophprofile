apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: avatar-service-netpol
  labels:
    app: avatar-service
spec:
  podSelector:
    matchLabels:
      app: avatar-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - port: 8080
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - port: 9090
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: minio
    ports:
    - port: 9000
  - to:
    - podSelector:
        matchLabels:
          app: rabbitmq
    ports:
    - port: 5672
  - to: []
    ports:
    - port: 53
      protocol: UDP
