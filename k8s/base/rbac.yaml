apiVersion: v1
kind: ServiceAccount
metadata:
  name: avatar-service
  labels:
    app: avatar-service
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: avatar-service
  labels:
    app: avatar-service
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: avatar-service
  labels:
    app: avatar-service
subjects:
- kind: ServiceAccount
  name: avatar-service
roleRef:
  kind: Role
  name: avatar-service
  apiGroup: rbac.authorization.k8s.io
