global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: gophprofile-server
    metrics_path: /metrics
    static_configs:
      - targets: ["server:8080"]

  - job_name: gophprofile-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:8081"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
