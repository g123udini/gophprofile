run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - bodyclose

issues:
  exclude-dirs:
    - web
    - migrations
    - docker
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
